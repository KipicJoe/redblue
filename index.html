<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 主页预览页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 26px;
        }

        /* 视频容器：固定大小，绝不变动 */
        .video-box {
            width: 100%;
            height: 420px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 视频：不拉伸、不填满、保持原比例、居中 */
        #myVideo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 你原来的两列正方形布局 100% 保留 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .item {
            aspect-ratio: 1 / 1;
            background: #1e1e1e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 主页预览页面</h1>

        <!-- 视频区域：固定窗体，不跳动 -->
        <div class="video-box">
            <video id="myVideo" muted autoplay playsinline></video>
        </div>

        <!-- 👇 你原来的功能 100% 完整保留 👇 -->
        <div class="grid">
            <div class="item">预览 1</div>
            <div class="item">预览 2</div>
            <div class="item">预览 3</div>
            <div class="item">预览 4</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const baseUrl = "https://api.kuleu.com/api/MP4_xiaojiejie";

        // 每次加载都刷新视频地址
        function playVideo() {
            video.src = baseUrl + "?t=" + new Date().getTime();
            video.load();
            video.play();
        }

        // 播完自动重新加载
        video.addEventListener("ended", playVideo);

        // 首次自动播放
        playVideo();
    </script>
</body>
</html>
