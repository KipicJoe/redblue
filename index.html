<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页预览页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 26px;
        }

        /* 视频容器：固定大小，绝对不动 */
        .video-box {
            width: 100%;
            height: 420px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            /* 让视频在框内居中 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 视频：不填满、不拉伸、保持原始比例 */
        .video-box video {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .item {
            aspect-ratio: 1 / 1;
            background: #1e1e1e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 主页预览页面</h1>

        <div class="video-box">
            <video id="myVideo" muted autoplay playsinline></video>
        </div>

        <div class="grid">
            <div class="item">预览 1</div>
            <div class="item">预览 2</div>
            <div class="item">预览 3</div>
            <div class="item">预览 4</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const baseUrl = 'https://api.kuleu.com/api/MP4_xiaojiejie';

        function loadVideo() {
            video.src = baseUrl + '?t=' + Date.now();
            video.load();
            video.play();
        }

        video.addEventListener('ended', loadVideo);
        loadVideo();
    </script>
</body>
</html>
